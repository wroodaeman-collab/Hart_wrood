<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قلب خطوط شعاعية</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            cursor: crosshair;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        const hearts = [];

        class HeartLine {
            constructor(startX, startY, endX, endY, delay) {
                this.startX = startX;
                this.startY = startY;
                this.endX = endX;
                this.endY = endY;
                this.currentX = startX;
                this.currentY = startY;
                this.delay = delay;
                this.progress = 0;
                this.speed = 0.03;
                this.color = '#ff1493';
                this.opacity = 0;
                this.life = 1;
                this.fadeSpeed = 0;
                this.active = false;
                this.startTime = Date.now();
                this.lineWidth = 0.1;
            }

            update() {
                if (!this.active && (Date.now() - this.startTime) > this.delay) {
                    this.active = true;
                }

                if (!this.active) return;

                if (this.progress < 1) {
                    this.progress += this.speed;
                    if (this.progress > 1) this.progress = 1;

                    this.currentX = this.startX + (this.endX - this.startX) * this.progress;
                    this.currentY = this.startY + (this.endY - this.startY) * this.progress;
                    this.opacity = Math.min(1, this.progress * 2);
                } else {
                    this.life -= this.fadeSpeed;
                    this.opacity = this.life;
                }
            }

            draw() {
                if (!this.active || this.opacity <= 0) return;

                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.lineWidth;
                ctx.lineCap = 'round';
                ctx.shadowBlur = 5;
                ctx.shadowColor = this.color;
                
                ctx.beginPath();
                ctx.moveTo(this.startX, this.startY);
                ctx.lineTo(this.currentX, this.currentY);
                ctx.stroke();
                
                ctx.restore();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        class Heart {
            constructor(x, y, size = 1) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.lines = [];
                this.createHeartLines();
            }

            createHeartLines() {
                const centerX = this.x;
                const centerY = this.y;
                const scale = this.size * 15;
                
                // Create heart outline points
                const heartPoints = [];
                for (let t = 0; t <= Math.PI * 2; t += 0.05) {
                    const x = 16 * Math.pow(Math.sin(t), 3);
                    const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                    heartPoints.push({
                        x: centerX + x * scale,
                        y: centerY + y * scale
                    });
                }

                // Center point for radiating lines
                const centerPoint = {
                    x: centerX,
                    y: centerY + scale * 0.3
                };

                // Create many radiating lines from center to heart outline
                heartPoints.forEach((point, index) => {
                    const delay = index * 10;
                    this.lines.push(new HeartLine(
                        centerPoint.x,
                        centerPoint.y,
                        point.x,
                        point.y,
                        delay
                    ));
                });

                // Create many additional internal lines
                for (let i = 0; i < heartPoints.length; i += 1) {
                    const point = heartPoints[i];
                    const delay = i * 15 + 500;
                    
                    // Lines from slightly different center points
                    const offsetX = (Math.random() - 0.5) * scale * 0.5;
                    const offsetY = (Math.random() - 0.5) * scale * 0.4;
                    
                    this.lines.push(new HeartLine(
                        centerPoint.x + offsetX,
                        centerPoint.y + offsetY,
                        point.x,
                        point.y,
                        delay
                    ));
                }

                // Create many cross-hatching lines
                for (let i = 0; i < 50; i++) {
                    const t1 = (i / 50) * Math.PI * 2;
                    const t2 = ((i + 25) / 50) * Math.PI * 2;
                    
                    const x1 = 16 * Math.pow(Math.sin(t1), 3);
                    const y1 = -(13 * Math.cos(t1) - 5 * Math.cos(2 * t1) - 2 * Math.cos(3 * t1) - Math.cos(4 * t1));
                    const x2 = 16 * Math.pow(Math.sin(t2), 3);
                    const y2 = -(13 * Math.cos(t2) - 5 * Math.cos(2 * t2) - 2 * Math.cos(3 * t2) - Math.cos(4 * t2));
                    
                    this.lines.push(new HeartLine(
                        centerX + x1 * scale,
                        centerY + y1 * scale,
                        centerX + x2 * scale,
                        centerY + y2 * scale,
                        i * 20 + 1500
                    ));
                }
            }

            update() {
                this.lines = this.lines.filter(line => {
                    line.update();
                    return !line.isDead();
                });
            }

            draw() {
                this.lines.forEach(line => line.draw());
            }

            isDead() {
                return this.lines.length === 0;
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            hearts.forEach(heart => {
                heart.update();
                heart.draw();
            });

            // Remove dead hearts
            for (let i = hearts.length - 1; i >= 0; i--) {
                if (hearts[i].isDead()) {
                    hearts.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        canvas.addEventListener('click', (e) => {
            // Clear all existing hearts
            hearts.length = 0;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const size = Math.random() * 0.5 + 0.8;
            hearts.push(new Heart(e.clientX, e.clientY, size));
        });

        // Create initial heart in center
        setTimeout(() => {
            hearts.push(new Heart(canvas.width / 2, canvas.height / 2, 1.2));
        }, 500);

        animate();
    </script>
</body>
</html>
